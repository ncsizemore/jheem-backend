# =============================================================================
# Test Custom Simulation Feasibility on GitHub Actions
# =============================================================================
# Tests whether the R container can run a full custom simulation pipeline
# (load workspace → load simset → run intervention → extract data)
# within the memory and time constraints of a standard GitHub Actions runner.
#
# Standard runner: 7 GB RAM, 2 vCPUs, 14 GB SSD
#
# Supports both MSA (city) and state-level simsets:
#   MSA:   location=C.12580, release=ryan-white-msa-v1.0.0, pattern={LOC}_base.Rdata
#   State: location=AL, release=ryan-white-state-v2.0.0, pattern=rw_final.ehe.state-1000_{LOC}_noint.Rdata
# =============================================================================

name: Test Custom Simulation

on:
  workflow_dispatch:
    inputs:
      location:
        description: 'Location code (e.g. C.12580 for MSA, AL for state)'
        required: true
        default: 'C.12580'
        type: string
      release:
        description: 'Simulation data release tag'
        required: true
        default: 'ryan-white-msa-v1.0.0'
        type: string
      file_pattern:
        description: 'Simset filename pattern ({LOC} replaced with location)'
        required: true
        default: '{LOC}_base.Rdata'
        type: string
      container_image:
        description: 'Container image to use'
        required: true
        default: 'ghcr.io/ncsizemore/jheem-ryan-white-model:2.0.0'
        type: string
      adap_loss:
        description: 'ADAP suppression loss (%)'
        required: true
        default: '50'
        type: string
      oahs_loss:
        description: 'OAHS suppression loss (%)'
        required: true
        default: '30'
        type: string
      other_loss:
        description: 'Other (RW support) suppression loss (%)'
        required: true
        default: '40'
        type: string

jobs:
  custom-sim-test:
    runs-on: ubuntu-latest
    steps:
      - name: System info
        run: |
          echo "=========================================="
          echo "SYSTEM INFO"
          echo "=========================================="
          echo "RAM: $(free -h | awk '/^Mem:/{print $2}')"
          echo "CPUs: $(nproc)"
          echo "Disk: $(df -h / | awk 'NR==2{print $4}') available"
          echo ""
          echo "Parameters:"
          echo "  Location: ${{ inputs.location }}"
          echo "  Release: ${{ inputs.release }}"
          echo "  File pattern: ${{ inputs.file_pattern }}"
          echo "  Container: ${{ inputs.container_image }}"
          echo "  ADAP loss: ${{ inputs.adap_loss }}%"
          echo "  OAHS loss: ${{ inputs.oahs_loss }}%"
          echo "  Other loss: ${{ inputs.other_loss }}%"

      - name: Download base simulation from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Replace {LOC} placeholder with actual location code
          FILENAME="${{ inputs.file_pattern }}"
          FILENAME="${FILENAME//\{LOC\}/${{ inputs.location }}}"

          echo "📥 Downloading $FILENAME from ${{ inputs.release }}..."
          mkdir -p simulations

          gh release download "${{ inputs.release }}" \
            --repo ncsizemore/jheem-simulations \
            --pattern "$FILENAME" \
            --dir ./simulations

          ls -lh ./simulations/
          echo "✅ Base simset downloaded"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Write test script
        run: |
          cat > test_custom_sim.R << 'RSCRIPT'
          # test_custom_sim.R
          # Runs the full custom simulation pipeline with memory/timing instrumentation

          cat("===========================================\n")
          cat("CUSTOM SIMULATION FEASIBILITY TEST\n")
          cat("===========================================\n\n")

          # --- Phase 1: Workspace loading ---
          cat("--- PHASE 1: Load workspace & restore state ---\n")
          mem_before <- gc(reset = TRUE)
          t1 <- proc.time()

          # Auto-detect and load workspace
          workspace_files <- list.files(pattern = "_workspace\\.RData$", ignore.case = TRUE)
          if (length(workspace_files) == 0) stop("No workspace file found")
          load(workspace_files[1])

          # Export jheem2 internals
          pkg_env <- asNamespace("jheem2")
          for (fn in ls(pkg_env, all.names = TRUE)) {
            if (exists(fn, pkg_env, inherits = FALSE) && is.function(get(fn, pkg_env))) {
              assign(fn, get(fn, pkg_env), envir = .GlobalEnv)
            }
          }

          # Restore VERSION.MANAGER
          vm <- asNamespace("jheem2")$VERSION.MANAGER
          for (name in names(.jheem2_state$version_manager)) {
            assign(name, .jheem2_state$version_manager[[name]], envir = vm)
          }

          # Restore ONTOLOGY.MAPPING.MANAGER
          ont_mgr <- get("ONTOLOGY.MAPPING.MANAGER", envir = asNamespace("jheem2"))
          for (name in names(.jheem2_state$ontology_mapping_manager)) {
            assign(name, .jheem2_state$ontology_mapping_manager[[name]], envir = ont_mgr)
          }

          library(distributions)
          library(locations)

          # Workaround for jheem2 bug: populate_outcomes_array crashes on NULL
          # new_values/old_times (affects aids.diagnoses and aids.deaths outcomes
          # in state-level simsets). Guard with NULL check before calling C++.
          original_poa <- get("populate_outcomes_array", envir = asNamespace("jheem2"))
          patched_poa <- function(desired_times, char_desired_times, n_per_time,
                                   new_values, new_times, old_values, old_times, prior_sim_index) {
            if (is.null(new_values) || is.null(old_times)) return(old_values)
            original_poa(desired_times, char_desired_times, n_per_time,
                         new_values, new_times, old_values, old_times, prior_sim_index)
          }
          environment(patched_poa) <- asNamespace("jheem2")
          assignInNamespace("populate_outcomes_array", patched_poa, ns = "jheem2")

          t1_elapsed <- (proc.time() - t1)["elapsed"]
          gc_after_workspace <- gc()
          mem_workspace_mb <- sum(gc_after_workspace[, "used"] * c(8, 8)) / 1024 / 1024
          cat(sprintf("  Time: %.1f seconds\n", t1_elapsed))
          cat(sprintf("  Memory after workspace: %.0f MB (used by R)\n", mem_workspace_mb))
          cat(sprintf("  System RSS: %s\n", system("ps -o rss= -p $PPID | awk '{printf \"%.0f MB\", $1/1024}'", intern = TRUE)))
          cat("\n")

          # --- Phase 2: Load base simset ---
          cat("--- PHASE 2: Load base simulation ---\n")
          t2 <- proc.time()

          # Find the simset file in /data/ (works for any naming pattern)
          simset_files <- list.files("/data/", pattern = "\\.Rdata$", full.names = TRUE, ignore.case = TRUE)
          if (length(simset_files) == 0) stop("No .Rdata files found in /data/")
          simset_path <- simset_files[1]
          cat(sprintf("  Loading: %s (%.0f MB)\n", basename(simset_path), file.size(simset_path) / 1024 / 1024))

          loaded <- load(simset_path)
          base_simset <- get(loaded[1])
          cat(sprintf("  Loaded: %s (class: %s)\n", loaded[1], class(base_simset)[1]))

          # Report simset size
          n_sims <- tryCatch({
            if (is.list(base_simset) && !is.null(base_simset$n.sim)) base_simset$n.sim
            else if (methods::is(base_simset, "R6") && !is.null(base_simset$n.sim)) base_simset$n.sim
            else "unknown"
          }, error = function(e) "unknown")
          cat(sprintf("  Number of simulations: %s\n", n_sims))

          t2_elapsed <- (proc.time() - t2)["elapsed"]
          gc_after_simset <- gc()
          mem_simset_mb <- sum(gc_after_simset[, "used"] * c(8, 8)) / 1024 / 1024
          cat(sprintf("  Time: %.1f seconds\n", t2_elapsed))
          cat(sprintf("  Memory after simset: %.0f MB\n", mem_simset_mb))
          cat(sprintf("  System RSS: %s\n", system("ps -o rss= -p $PPID | awk '{printf \"%.0f MB\", $1/1024}'", intern = TRUE)))
          cat("\n")

          # --- Phase 3: Create intervention & run simulation ---
          cat("--- PHASE 3: Run custom simulation ---\n")
          t3 <- proc.time()

          # Load simulation modules
          source("simulation/simple_ryan_white.R")

          adap_loss <- as.numeric(Sys.getenv("TEST_ADAP_LOSS", "50"))
          oahs_loss <- as.numeric(Sys.getenv("TEST_OAHS_LOSS", "30"))
          other_loss <- as.numeric(Sys.getenv("TEST_OTHER_LOSS", "40"))

          params <- list(
            adap_suppression_loss = adap_loss,
            oahs_suppression_loss = oahs_loss,
            other_suppression_loss = other_loss
          )

          cat(sprintf("  Parameters: ADAP=%g%%, OAHS=%g%%, Other=%g%%\n", adap_loss, oahs_loss, other_loss))

          intervention <- create_ryan_white_intervention(params)
          results <- run_custom_simulation(base_simset, intervention)

          t3_elapsed <- (proc.time() - t3)["elapsed"]
          gc_after_sim <- gc()
          mem_sim_mb <- sum(gc_after_sim[, "used"] * c(8, 8)) / 1024 / 1024
          cat(sprintf("  Time: %.1f seconds\n", t3_elapsed))
          cat(sprintf("  Memory after simulation: %.0f MB\n", mem_sim_mb))
          cat(sprintf("  Peak memory (Vcells max used): %.0f MB\n",
                      gc_after_sim["Vcells", "max used"] * 8 / 1024 / 1024))
          cat(sprintf("  System RSS: %s\n", system("ps -o rss= -p $PPID | awk '{printf \"%.0f MB\", $1/1024}'", intern = TRUE)))
          cat("\n")

          # --- Phase 4: Extract outcome data (like batch mode) ---
          cat("--- PHASE 4: Extract outcome data ---\n")
          t4 <- proc.time()

          # Test extracting a few key outcomes from the results
          # This mimics what extract_summary_data.R / batch mode does
          test_outcomes <- c("incidence", "diagnosed.prevalence", "suppression")
          data_manager <- if (exists("WEB.DATA.MANAGER")) WEB.DATA.MANAGER else if (exists("RW.DATA.MANAGER")) RW.DATA.MANAGER else NULL

          for (outcome in test_outcomes) {
            tryCatch({
              # Extract mean and interval for unfaceted
              values <- results$get(outcome, dimension.values = list(), keep.dimensions = character(0))
              cat(sprintf("  %s: extracted (%s)\n", outcome, paste(dim(values), collapse = "x")))
            }, error = function(e) {
              cat(sprintf("  %s: FAILED (%s)\n", outcome, e$message))
            })
          }

          t4_elapsed <- (proc.time() - t4)["elapsed"]
          cat(sprintf("  Time: %.1f seconds\n", t4_elapsed))
          cat("\n")

          # --- Summary ---
          total_elapsed <- t1_elapsed + t2_elapsed + t3_elapsed + t4_elapsed
          cat("===========================================\n")
          cat("RESULTS SUMMARY\n")
          cat("===========================================\n")
          cat(sprintf("  Phase 1 (workspace):   %6.1f sec\n", t1_elapsed))
          cat(sprintf("  Phase 2 (load simset): %6.1f sec\n", t2_elapsed))
          cat(sprintf("  Phase 3 (simulation):  %6.1f sec\n", t3_elapsed))
          cat(sprintf("  Phase 4 (extraction):  %6.1f sec\n", t4_elapsed))
          cat(sprintf("  TOTAL:                 %6.1f sec (%.1f min)\n", total_elapsed, total_elapsed / 60))
          cat(sprintf("  Peak R memory:         %.0f MB\n",
                      gc_after_sim["Vcells", "max used"] * 8 / 1024 / 1024))
          cat(sprintf("  Final system RSS:      %s\n",
                      system("ps -o rss= -p $PPID | awk '{printf \"%.0f MB\", $1/1024}'", intern = TRUE)))
          cat("\n")

          if (mem_sim_mb < 5000) {
            cat("✅ FEASIBLE: Peak memory well within 7 GB runner limit\n")
          } else if (mem_sim_mb < 6500) {
            cat("⚠️  TIGHT: Peak memory approaching 7 GB runner limit\n")
          } else {
            cat("❌ INFEASIBLE: Peak memory exceeds safe threshold for 7 GB runner\n")
          }

          cat("===========================================\n")
          RSCRIPT

          echo "✅ Test script written"

      - name: Run custom simulation test
        env:
          TEST_ADAP_LOSS: ${{ inputs.adap_loss }}
          TEST_OAHS_LOSS: ${{ inputs.oahs_loss }}
          TEST_OTHER_LOSS: ${{ inputs.other_loss }}
        run: |
          echo "🚀 Running custom simulation test..."
          echo ""

          # Monitor container memory via docker stats in background
          CONTAINER_NAME="custom-sim-test"
          (while true; do
            STATS=$(docker stats --no-stream --format "{{.MemUsage}}" $CONTAINER_NAME 2>/dev/null)
            if [ -n "$STATS" ]; then
              echo "$(date +%H:%M:%S) | Container memory: $STATS"
            fi
            sleep 10
          done) | tee memory_log.txt &
          MONITOR_PID=$!

          # Run the container with the test script and simset mounted
          docker run --rm \
            --name $CONTAINER_NAME \
            --entrypoint "" \
            -v $(pwd)/simulations:/data:ro \
            -v $(pwd)/test_custom_sim.R:/app/test_custom_sim.R:ro \
            -e TEST_ADAP_LOSS -e TEST_OAHS_LOSS -e TEST_OTHER_LOSS \
            ${{ inputs.container_image }} \
            R --slave -e "source('test_custom_sim.R')"

          kill $MONITOR_PID 2>/dev/null || true
