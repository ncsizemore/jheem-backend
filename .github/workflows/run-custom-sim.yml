# =============================================================================
# Run Custom Simulation
# =============================================================================
# Runs a custom simulation with user-specified parameters, extracts data in
# the same JSON format as batch mode, aggregates into a per-location file,
# and uploads to S3/CloudFront.
#
# The output is identical to prerun data — the portal renders it the same way.
#
# Scenario key is derived deterministically from parameters (e.g., "a50-o30-r40")
# so identical parameters always map to the same S3 path for caching.
#
# S3 layout:
#   portal/{s3Path}/custom/{location}/{scenario-key}.json       (data)
#   portal/{s3Path}/custom/{location}/{scenario-key}-status.json (status)
#
# Triggered manually (workflow_dispatch) or via API for portal-initiated runs.
# =============================================================================

name: Run Custom Simulation
run-name: "custom-sim: ${{ inputs.model_id }} ${{ inputs.location }} ${{ inputs.parameters }}"

on:
  workflow_dispatch:
    inputs:
      model_id:
        description: 'Model ID from models.json (e.g., ryan-white-msa)'
        required: true
        default: 'ryan-white-msa'
        type: string
      location:
        description: 'Location code (e.g., C.12580 for MSA, AL for state)'
        required: true
        type: string
      parameters:
        description: 'JSON object of parameter values (e.g., {"adap_loss": 50, "oahs_loss": 30, "other_loss": 40})'
        required: true
        type: string
      release_override:
        description: 'Override data release tag (empty = use models.json)'
        required: false
        default: ''
        type: string
      container_image_override:
        description: 'Override container image (empty = use models.json)'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Skip S3 upload (for testing)'
        required: false
        type: boolean
        default: false

jobs:
  custom-sim:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout jheem-backend (for config)
        uses: actions/checkout@v4

      - name: Load model configuration
        id: config
        env:
          MODEL_ID: ${{ inputs.model_id }}
          LOCATION: ${{ inputs.location }}
          PARAMS: ${{ inputs.parameters }}
          CONTAINER_IMAGE_OVERRIDE: ${{ inputs.container_image_override }}
          RELEASE_OVERRIDE: ${{ inputs.release_override }}
        run: |
          CONFIG_FILE=".github/config/models.json"

          echo "📋 Loading configuration for model: $MODEL_ID"

          # Verify model has customSimulation config
          HAS_CUSTOM=$(jq -r ".\"$MODEL_ID\".customSimulation // empty" $CONFIG_FILE)
          if [ -z "$HAS_CUSTOM" ]; then
            echo "❌ Model '$MODEL_ID' does not have customSimulation config in models.json"
            exit 1
          fi

          # --- Build scenario key and env vars from models.json parameter definitions ---
          # Read parameter definitions from models.json
          PARAM_DEFS=$(jq -c ".\"$MODEL_ID\".customSimulation.parameters" $CONFIG_FILE)

          # Build scenario key (e.g., "a50-o30-r40") and env var flags
          SCENARIO_KEY=""
          SCENARIO_LABEL=""
          ENV_FLAGS=""
          PARAM_COUNT=$(echo "$PARAM_DEFS" | jq 'length')

          for i in $(seq 0 $((PARAM_COUNT - 1))); do
            PARAM_ID=$(echo "$PARAM_DEFS" | jq -r ".[$i].id")
            ENV_VAR=$(echo "$PARAM_DEFS" | jq -r ".[$i].envVar")
            KEY_PREFIX=$(echo "$PARAM_DEFS" | jq -r ".[$i].keyPrefix")
            LABEL=$(echo "$PARAM_DEFS" | jq -r ".[$i].label")
            DEFAULT=$(echo "$PARAM_DEFS" | jq -r ".[$i].default")
            UNIT=$(echo "$PARAM_DEFS" | jq -r ".[$i].unit")

            # Get value from user params, fall back to default
            VALUE=$(echo "$PARAMS" | jq -r ".${PARAM_ID} // $DEFAULT")

            # Defense in depth: parameter values must be integers 0-100.
            # The portal API already validates this, but the workflow
            # cannot trust the caller (workflow_dispatch is callable
            # directly with sufficient permissions).
            if ! [[ "$VALUE" =~ ^[0-9]+$ ]] || [ "$VALUE" -lt 0 ] || [ "$VALUE" -gt 100 ]; then
              echo "❌ Invalid value for $PARAM_ID: '$VALUE' (must be integer 0-100)"
              exit 1
            fi

            # Build scenario key part
            if [ -n "$SCENARIO_KEY" ]; then
              SCENARIO_KEY="${SCENARIO_KEY}-"
              SCENARIO_LABEL="${SCENARIO_LABEL}, "
            fi
            SCENARIO_KEY="${SCENARIO_KEY}${KEY_PREFIX}${VALUE}"
            SCENARIO_LABEL="${SCENARIO_LABEL}${LABEL} ${VALUE}${UNIT}"

            # Build docker env flags
            ENV_FLAGS="${ENV_FLAGS} -e ${ENV_VAR}=${VALUE}"
          done

          echo "scenario_key=$SCENARIO_KEY" >> $GITHUB_OUTPUT
          echo "scenario_label=$SCENARIO_LABEL" >> $GITHUB_OUTPUT
          echo "env_flags=$ENV_FLAGS" >> $GITHUB_OUTPUT

          # --- Read other config ---
          SIMULATION_SCRIPT=$(jq -r ".\"$MODEL_ID\".customSimulation.simulationScript" $CONFIG_FILE)
          echo "simulation_script=$SIMULATION_SCRIPT" >> $GITHUB_OUTPUT

          OUTCOMES=$(jq -r ".\"$MODEL_ID\".outcomes | join(\",\")" $CONFIG_FILE)
          echo "outcomes=$OUTCOMES" >> $GITHUB_OUTPUT

          STATISTICS=$(jq -r ".\"$MODEL_ID\".customSimulation.statistics | join(\",\")" $CONFIG_FILE)
          echo "statistics=$STATISTICS" >> $GITHUB_OUTPUT

          FACETS=$(jq -r ".\"$MODEL_ID\".customSimulation.facets | join(\",\")" $CONFIG_FILE)
          echo "facets=$FACETS" >> $GITHUB_OUTPUT

          # Container image
          CONFIG_CONTAINER=$(jq -r ".\"$MODEL_ID\".container.image + \":\" + .\"$MODEL_ID\".container.version" $CONFIG_FILE)
          if [ -n "$CONTAINER_IMAGE_OVERRIDE" ]; then
            CONTAINER_IMAGE="$CONTAINER_IMAGE_OVERRIDE"
          else
            CONTAINER_IMAGE="$CONFIG_CONTAINER"
          fi
          echo "container_image=$CONTAINER_IMAGE" >> $GITHUB_OUTPUT

          # Data source
          CONFIG_RELEASE=$(jq -r ".\"$MODEL_ID\".dataSource.release" $CONFIG_FILE)
          DATA_SOURCE_PATTERN=$(jq -r ".\"$MODEL_ID\".dataSource.filePattern // empty" $CONFIG_FILE)
          if [ -n "$RELEASE_OVERRIDE" ]; then
            RELEASE="$RELEASE_OVERRIDE"
          else
            RELEASE="$CONFIG_RELEASE"
          fi
          echo "release=$RELEASE" >> $GITHUB_OUTPUT
          echo "data_source_pattern=$DATA_SOURCE_PATTERN" >> $GITHUB_OUTPUT

          # Output paths
          S3_BUCKET=$(jq -r ".\"$MODEL_ID\".output.s3Bucket" $CONFIG_FILE)
          S3_PATH=$(jq -r ".\"$MODEL_ID\".output.s3Path" $CONFIG_FILE)
          echo "s3_bucket=$S3_BUCKET" >> $GITHUB_OUTPUT
          echo "s3_path=$S3_PATH" >> $GITHUB_OUTPUT

          # CloudFront
          CF_DIST_ID=$(jq -r "._infrastructure.cloudfrontDistributionId" $CONFIG_FILE)
          echo "cloudfront_distribution_id=$CF_DIST_ID" >> $GITHUB_OUTPUT

          echo ""
          echo "=========================================="
          echo "Custom simulation configuration"
          echo "=========================================="
          echo "  Location:      $LOCATION"
          echo "  Scenario key:  $SCENARIO_KEY"
          echo "  Scenario label: $SCENARIO_LABEL"
          echo "  Container:     $CONTAINER_IMAGE"
          echo "  Release:       $RELEASE"
          echo "  Outcomes:      $OUTCOMES"
          echo "  Statistics:    $STATISTICS"
          echo "  Facets:        $FACETS"
          echo "  S3 path:       s3://$S3_BUCKET/$S3_PATH/custom/$LOCATION/$SCENARIO_KEY.json"

      - name: Configure AWS credentials
        if: inputs.dry_run != true
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Download base simset from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LOCATION: ${{ inputs.location }}
          RELEASE: ${{ steps.config.outputs.release }}
          PATTERN: ${{ steps.config.outputs.data_source_pattern }}
        run: |
          # Build download pattern
          if [ -n "$PATTERN" ]; then
            DL_PATTERN=$(echo "$PATTERN" | sed "s/{STATE}/$LOCATION/g" | sed "s/{LOC}/$LOCATION/g")
          else
            DL_PATTERN="*${LOCATION}*"
          fi

          echo "📥 Downloading base simset from $RELEASE (pattern: $DL_PATTERN)"
          mkdir -p simulations

          gh release download "$RELEASE" \
            --repo ncsizemore/jheem-simulations \
            --pattern "$DL_PATTERN" \
            --dir ./simulations

          echo "📦 Downloaded files:"
          ls -lh ./simulations/

          # Keep only the base file (contains "base" or "noint")
          for f in ./simulations/*.Rdata; do
            [ -f "$f" ] || continue
            filename=$(basename "$f")
            if [[ "$filename" != *"base"* ]] && [[ "$filename" != *"noint"* ]]; then
              echo "  Removing non-base file: $filename"
              rm "$f"
            fi
          done

          echo "✅ Base simset ready:"
          ls -lh ./simulations/

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout jheem-portal (for aggregation scripts)
        uses: actions/checkout@v4
        with:
          repository: ncsizemore/jheem-portal
          path: portal

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install portal dependencies
        working-directory: portal
        # GITHUB_TOKEN is needed by the portal's postinstall (sync-config.ts)
        # to fetch models.json from this (now-private) repo via the
        # authenticated GitHub Contents API. The runner-issued token has
        # contents:read on its own repo by default, which is exactly what
        # the script needs. Passed via env: (not interpolated into the
        # shell body) for the same reason all the other secrets are.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Run custom simulation
        env:
          LOCATION: ${{ inputs.location }}
          MODEL_ID: ${{ inputs.model_id }}
          SIMULATION_SCRIPT: ${{ steps.config.outputs.simulation_script }}
          SCENARIO_KEY: ${{ steps.config.outputs.scenario_key }}
          SCENARIO_LABEL: ${{ steps.config.outputs.scenario_label }}
          ENV_FLAGS: ${{ steps.config.outputs.env_flags }}
          CONTAINER_IMAGE: ${{ steps.config.outputs.container_image }}
          OUTCOMES: ${{ steps.config.outputs.outcomes }}
          STATISTICS: ${{ steps.config.outputs.statistics }}
          FACETS: ${{ steps.config.outputs.facets }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          echo "🚀 Running custom simulation for $LOCATION..."
          echo "   Scenario: $SCENARIO_KEY"
          echo ""

          mkdir -p output

          # Progress key for Upstash Redis — matches the portal status API lookup
          PROGRESS_KEY="progress:${MODEL_ID}:${LOCATION}:${SCENARIO_KEY}"

          # Step 1: Run custom simulation (saves simsets to output/simulations/)
          # $ENV_FLAGS is intentionally unquoted so the shell word-splits it
          # into separate -e flags. Its values were validated as integers 0-100
          # in the "Load model configuration" step.
          #
          # Stdout is piped through a while-read loop that:
          #   - Echoes every line to the job log (preserving normal output)
          #   - Parses "[Pp]rogress: N of M" lines from the R container
          #     (container versions vary: "Simulation progress:" vs "Progress:")
          #   - Writes progress to Upstash Redis every 10th simulation
          #     (stays well within the 10,000 cmd/day free tier)
          #   - Uses a 30-minute TTL so stale progress auto-expires
          set +e
          docker run --rm \
            -v "$(pwd)/simulations:/data:ro" \
            -v "$(pwd)/output:/output" \
            -e "LOCATION=$LOCATION" \
            -e "MODEL_ID=$MODEL_ID" \
            -e "SIMULATION_SCRIPT=$SIMULATION_SCRIPT" \
            -e "SCENARIO_KEY=$SCENARIO_KEY" \
            -e "SCENARIO_LABEL=$SCENARIO_LABEL" \
            -e "OUTPUT_DIR=/output" \
            $ENV_FLAGS \
            "$CONTAINER_IMAGE" \
            custom 2>&1 | while IFS= read -r line; do
              echo "$line"
              if [[ "$line" =~ [Pp]rogress:\ ([0-9]+)\ of\ ([0-9]+) ]]; then
                current="${BASH_REMATCH[1]}"
                total="${BASH_REMATCH[2]}"
                if (( total > 0 && current % 10 == 0 )); then
                  pct=$((current * 100 / total))
                  # Fire-and-forget: Redis failure must not kill the sim,
                  # but log errors so misconfig is visible in the job log.
                  # Use jq to build the body — shell printf mangles nested JSON quotes.
                  body=$(jq -n -c \
                    --arg key "$PROGRESS_KEY" \
                    --arg val "{\"percent\":${pct},\"simsComplete\":${current},\"simsTotal\":${total}}" \
                    '["SET", $key, $val, "EX", "1800"]')
                  resp=$(curl -s -w "\n%{http_code}" \
                    "${UPSTASH_REDIS_REST_URL}" \
                    -H "Authorization: Bearer ${UPSTASH_REDIS_REST_TOKEN}" \
                    -d "$body" 2>&1) || true
                  http_code=$(echo "$resp" | tail -1)
                  if [ "$http_code" != "200" ] && [ "${progress_fail_logged:-}" != "1" ]; then
                    echo "  [progress] Redis write failed (HTTP $http_code): $(echo "$resp" | head -1)" >&2
                    progress_fail_logged=1
                  elif [ "$http_code" = "200" ] && [ "${progress_ok_logged:-}" != "1" ]; then
                    echo "  [progress] Redis write OK (key: $PROGRESS_KEY)"
                    progress_ok_logged=1
                  fi
                fi
              fi
            done
          sim_exit=${PIPESTATUS[0]}
          set -e
          if [ "$sim_exit" -ne 0 ]; then
            echo "❌ Custom simulation failed (exit code $sim_exit)"
            exit "$sim_exit"
          fi

          echo ""
          echo "📊 Running batch extraction..."

          # Step 2: Extract data from simsets (reads from simulations/, writes JSON to output/)
          # Some outcome/facet combinations may not exist in the model's ontology
          # (e.g., 'risk' dimension for certain outcomes). The batch process exits
          # non-zero on any errors, so we capture the exit code and check file count.
          set +e
          docker run --rm \
            -v "$(pwd)/output/simulations:/app/simulations:ro" \
            -v "$(pwd)/output:/output" \
            -e "MODEL_ID=$MODEL_ID" \
            "$CONTAINER_IMAGE" \
            batch \
            --city "$LOCATION" \
            --scenarios "$SCENARIO_KEY" \
            --outcomes "$OUTCOMES" \
            --statistics "$STATISTICS" \
            --facets "$FACETS" \
            --output-dir "/output/$LOCATION/$SCENARIO_KEY" \
            --output-mode data \
            --json-only
          batch_exit=$?
          set -e

          file_count=$(find output -name "*.json" 2>/dev/null | wc -l)
          echo ""
          echo "📊 Generated $file_count JSON files (batch exit code: $batch_exit)"

          if [ "$file_count" -eq 0 ]; then
            echo "❌ No files generated"
            exit 1
          fi

          echo "✅ Custom simulation and extraction complete"

      - name: Aggregate location data
        working-directory: portal
        env:
          LOCATION: ${{ inputs.location }}
        run: |
          echo "📊 Aggregating data for $LOCATION..."

          mkdir -p public/data

          # Find the location directory in output
          location_dir="../output/$LOCATION"
          if [ ! -d "$location_dir" ]; then
            echo "Looking for output directory..."
            find ../output -type d -maxdepth 2
            location_dir=$(find ../output -type d -name "$LOCATION" | head -1)
          fi

          echo "Using directory: $location_dir"
          npx tsx scripts/aggregate-city-data.ts "$location_dir" "public/data/$LOCATION.json"

          if [ -f "public/data/$LOCATION.json" ]; then
            size=$(ls -lh "public/data/$LOCATION.json" | awk '{print $5}')
            echo "✅ Created $LOCATION.json ($size)"
          else
            echo "❌ Failed to create $LOCATION.json"
            exit 1
          fi

      - name: Upload to S3
        if: inputs.dry_run != true
        working-directory: portal
        env:
          LOCATION: ${{ inputs.location }}
          S3_BUCKET: ${{ steps.config.outputs.s3_bucket }}
          S3_PATH: ${{ steps.config.outputs.s3_path }}
          SCENARIO_KEY: ${{ steps.config.outputs.scenario_key }}
        run: |
          S3_DEST="s3://${S3_BUCKET}/${S3_PATH}/custom/${LOCATION}/${SCENARIO_KEY}.json"

          echo "☁️ Uploading to $S3_DEST"

          gzip -c "public/data/${LOCATION}.json" > "public/data/${LOCATION}.json.gz"

          aws s3 cp "public/data/${LOCATION}.json.gz" \
            "$S3_DEST" \
            --content-type "application/json" \
            --content-encoding "gzip"

          echo "✅ Uploaded to S3"

      - name: Invalidate CloudFront cache
        if: inputs.dry_run != true
        env:
          LOCATION: ${{ inputs.location }}
          S3_PATH: ${{ steps.config.outputs.s3_path }}
          CF_DIST_ID: ${{ steps.config.outputs.cloudfront_distribution_id }}
        run: |
          CF_PATH="/${S3_PATH#portal/}/custom/${LOCATION}/*"

          echo "🔄 Invalidating CloudFront cache for $CF_PATH"

          aws cloudfront create-invalidation \
            --distribution-id "$CF_DIST_ID" \
            --paths "$CF_PATH" \
            --output text

          echo "✅ Cache invalidation requested"

      - name: Skip S3 upload (dry run)
        if: inputs.dry_run == true
        env:
          LOCATION: ${{ inputs.location }}
          SCENARIO_KEY: ${{ steps.config.outputs.scenario_key }}
        run: |
          echo "🔸 DRY RUN — Skipping S3 upload"
          echo "Would upload to: custom/${LOCATION}/${SCENARIO_KEY}.json"

      - name: Notify completion
        # Calls the portal, which drains any queued email notifications
        # for this scenario and sends them via Resend. Email never
        # transits this workflow — see jheem-portal/src/lib/notify.ts
        # for the stash/drain design. continue-on-error so a transient
        # portal failure does not mark the whole run as failed.
        if: success() && inputs.dry_run != true
        continue-on-error: true
        env:
          NOTIFY_SECRET: ${{ secrets.NOTIFY_SECRET }}
          MODEL_ID: ${{ inputs.model_id }}
          LOCATION: ${{ inputs.location }}
          SCENARIO_KEY: ${{ steps.config.outputs.scenario_key }}
        run: |
          PAYLOAD=$(jq -n \
            --arg modelId "$MODEL_ID" \
            --arg location "$LOCATION" \
            --arg scenarioKey "$SCENARIO_KEY" \
            '{modelId: $modelId, location: $location, scenarioKey: $scenarioKey}')

          RESPONSE=$(curl --silent --show-error --fail \
            -X POST https://jheem.org/api/custom-sim/notify \
            -H "Authorization: Bearer $NOTIFY_SECRET" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "🔔 Portal notify response: $RESPONSE"

      - name: Summary
        if: always()
        env:
          MODEL_ID: ${{ inputs.model_id }}
          LOCATION: ${{ inputs.location }}
          DRY_RUN: ${{ inputs.dry_run }}
          SCENARIO_KEY: ${{ steps.config.outputs.scenario_key }}
          SCENARIO_LABEL: ${{ steps.config.outputs.scenario_label }}
          S3_PATH: ${{ steps.config.outputs.s3_path }}
        run: |
          echo ""
          echo "=========================================="
          echo "Custom Simulation Summary"
          echo "=========================================="
          echo ""
          echo "Model: $MODEL_ID"
          echo "Location: $LOCATION"
          echo "Scenario key: $SCENARIO_KEY"
          echo "Scenario label: $SCENARIO_LABEL"
          echo "Dry run: $DRY_RUN"
          if [ "$DRY_RUN" != "true" ]; then
            echo ""
            echo "Data: https://d320iym4dtm9lj.cloudfront.net/${S3_PATH#portal/}/custom/${LOCATION}/${SCENARIO_KEY}.json"
          fi
